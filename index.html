<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dopaminerjik Sistem Haritası — Mekanizma Komutanı</title>
<meta name="description" content="Dopamin sentezi, transporterları, reseptörleri ve etki eden 60+ ajanın moleküler hedef haritası. Klinisyenler ve sağlık profesyonelleri için." />
<meta name="author" content="Uzm. Dr. İsmail Can Çiftçi" />
<meta property="og:title" content="Dopaminerjik Sistem Haritası" />
<meta property="og:description" content="60+ ajanın dopamin sistemi üzerindeki moleküler etki haritası." />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0c0e14;
    --bg-2: #14171f;
    --bg-3: #1c2029;
    --bg-card: #161a23;
    --bg-elev: #1f242e;
    --ink: #ece7d8;
    --ink-2: #b8b2a1;
    --ink-3: #7e7a6e;
    --line: rgba(236, 231, 216, 0.08);
    --line-2: rgba(236, 231, 216, 0.16);
    --line-3: rgba(236, 231, 216, 0.28);
    --accent: #d4a574;
    --accent-2: #e8b886;
    --accent-strong: #f2c896;
    --hot: #e8593c;
    --cool: #5dcaa5;

    --cat-substrate: #5dcaa5;
    --cat-cofactor: #a78bfa;
    --cat-enzyme: #fb7185;
    --cat-transporter: #22d3ee;
    --cat-releaser: #fb923c;
    --cat-agonist: #60a5fa;
    --cat-antagonist: #fbbf24;
    --cat-modulator: #c084fc;

    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 16px;

    --font-display: 'Fraunces', 'Times New Roman', serif;
    --font-body: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;

    --tr: 180ms cubic-bezier(.4,0,.2,1);
  }

  :root[data-theme="light"] {
    --bg: #fafaf6;
    --bg-2: #f1eee5;
    --bg-3: #e8e3d4;
    --bg-card: #ffffff;
    --bg-elev: #faf7ee;
    --ink: #1c1f1a;
    --ink-2: #4d4a3f;
    --ink-3: #807a6a;
    --line: rgba(28, 31, 26, 0.08);
    --line-2: rgba(28, 31, 26, 0.18);
    --line-3: rgba(28, 31, 26, 0.32);
    --accent: #7a4f1b;
    --accent-2: #8f5e21;
    --accent-strong: #5c3a10;

    --cat-substrate: #0f6e56;
    --cat-cofactor: #534ab7;
    --cat-enzyme: #993556;
    --cat-transporter: #0c6e85;
    --cat-releaser: #993c1d;
    --cat-agonist: #185fa5;
    --cat-antagonist: #854f0b;
    --cat-modulator: #6b21a8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01", "cv11";
    overflow-x: hidden;
  }

  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0;
    margin: -1px; overflow: hidden; clip: rect(0,0,0,0);
    white-space: nowrap; border: 0;
  }

  .wrap {
    max-width: 1320px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ============ HEADER ============ */
  header.hero {
    padding: 80px 0 64px;
    border-bottom: 1px solid var(--line);
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(212, 165, 116, 0.06), transparent 70%),
      linear-gradient(180deg, var(--bg-2), var(--bg) 100%);
    position: relative;
  }
  header.hero::after {
    content: "";
    position: absolute;
    inset: auto 0 0 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--line-2) 30%, var(--line-2) 70%, transparent);
  }
  .hero-grid {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    align-items: flex-end;
  }
  .kicker {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .kicker::before {
    content: "";
    display: inline-block;
    width: 28px;
    height: 1px;
    background: var(--accent);
  }
  h1.title {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(38px, 6vw, 68px);
    line-height: 1.02;
    letter-spacing: -0.02em;
    color: var(--ink);
    margin-bottom: 24px;
    font-variation-settings: "opsz" 144;
  }
  h1.title em {
    font-style: italic;
    color: var(--accent-strong);
    font-weight: 300;
  }
  .lede {
    font-size: 17px;
    color: var(--ink-2);
    max-width: 640px;
    line-height: 1.55;
  }
  .lede strong {
    color: var(--ink);
    font-weight: 500;
  }
  .hero-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: flex-end;
  }
  .theme-toggle.inline {
    width: 44px;
    height: 44px;
    border-radius: var(--r-md);
    flex-shrink: 0;
  }
  .theme-toggle {
    background: var(--bg-card);
    border: 1px solid var(--line-2);
    color: var(--ink-2);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: var(--tr);
  }
  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .theme-toggle svg { width: 18px; height: 18px; }
  .theme-toggle .sun { display: none; }
  :root[data-theme="light"] .theme-toggle .moon { display: none; }
  :root[data-theme="light"] .theme-toggle .sun { display: block; }
  .stat-strip {
    display: flex;
    gap: 32px;
    margin-top: 56px;
    padding-top: 32px;
    border-top: 1px solid var(--line);
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-num {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1;
    font-variation-settings: "opsz" 144;
  }
  .stat-lbl {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-3);
  }

  /* ============ DIAGRAM SECTION ============ */
  section.diagram-section {
    padding: 48px 0 40px;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
  }
  section.diagram-section.first {
    padding-top: 56px;
  }
  .section-head {
    margin-bottom: 40px;
    max-width: 720px;
  }
  .section-head .lbl {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
    display: block;
  }
  .section-head h2 {
    font-family: var(--font-display);
    font-weight: 400;
    font-size: clamp(28px, 3.5vw, 40px);
    line-height: 1.1;
    letter-spacing: -0.015em;
    margin-bottom: 14px;
    font-variation-settings: "opsz" 144;
  }
  .section-head p {
    color: var(--ink-2);
    font-size: 15px;
  }
  .diagram-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 32px 28px;
    position: relative;
    overflow: hidden;
  }
  .diagram-card::before {
    content: "";
    position: absolute;
    top: 0; left: 32px; right: 32px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }
  svg.pathway { width: 100%; height: auto; display: block; }

  svg .node, svg .target {
    transition: opacity .25s, stroke-width .25s, filter .25s;
  }
  svg .target.dim { opacity: 0.18; }
  svg .target.hl rect { stroke-width: 2.5; filter: drop-shadow(0 0 12px currentColor); }
  svg .layer-lbl {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    fill: var(--accent);
  }
  svg text.t, svg text.th { font-family: var(--font-body); font-size: 14px; font-weight: 500; }
  svg text.ts { font-family: var(--font-body); font-size: 12px; font-weight: 400; }
  svg text.cofactor { font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.04em; fill: var(--ink-3); }

  svg .box-tyr rect { fill: var(--bg-3); stroke: var(--ink-3); }
  svg .box-tyr text { fill: var(--ink); }

  svg .box-ldopa rect { fill: rgba(96, 165, 250, 0.12); stroke: var(--cat-agonist); }
  svg .box-ldopa text { fill: var(--cat-agonist); }
  svg .box-ldopa text.th { fill: var(--ink); }

  svg .box-da rect { fill: rgba(212, 165, 116, 0.18); stroke: var(--accent); }
  svg .box-da text.th { fill: var(--accent-strong); }
  svg .box-da text.ts { fill: var(--accent); }

  svg .box-ne rect, svg .box-epi rect { fill: rgba(96, 165, 250, 0.08); stroke: var(--cat-agonist); }
  svg .box-ne text, svg .box-epi text { fill: var(--cat-agonist); }
  svg .box-ne text.th, svg .box-epi text.th { fill: var(--ink); }

  svg .box-enzyme rect { fill: rgba(251, 113, 133, 0.12); stroke: var(--cat-enzyme); }
  svg .box-enzyme text { fill: var(--cat-enzyme); }

  svg .box-transporter rect { fill: rgba(34, 211, 238, 0.10); stroke: var(--cat-transporter); }
  svg .box-transporter text.th { fill: var(--ink); }
  svg .box-transporter text.ts { fill: var(--cat-transporter); }

  svg .box-deg rect { fill: rgba(251, 113, 133, 0.10); stroke: var(--cat-enzyme); }
  svg .box-deg text.th { fill: var(--ink); }
  svg .box-deg text.ts { fill: var(--cat-enzyme); }

  svg .box-receptor rect { fill: rgba(192, 132, 252, 0.10); stroke: var(--cat-modulator); }
  svg .box-receptor text.th { fill: var(--ink); }
  svg .box-receptor text.ts { fill: var(--cat-modulator); }

  svg .arr-line { stroke: var(--ink-3); stroke-width: 1.4; fill: none; }
  svg .arr-line-dash { stroke: var(--ink-3); stroke-width: 0.8; fill: none; stroke-dasharray: 3 3; opacity: 0.6; }
  svg .arrow-head { fill: var(--ink-3); }

  /* ============ PATHWAY PILLS ============ */
  .pathway-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 28px;
  }
  .pp {
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 14px;
    background: var(--bg-2);
    border-radius: 999px;
    color: var(--ink-2);
    border: 1px solid var(--line);
    transition: var(--tr);
    letter-spacing: 0.02em;
  }
  .pp.hl {
    background: rgba(212, 165, 116, 0.14);
    border-color: var(--accent);
    color: var(--accent-strong);
  }
  :root[data-theme="light"] .pp.hl {
    background: rgba(122, 79, 27, 0.10);
  }

  /* ============ FILTER BAR ============ */
  section.filter-section {
    padding: 32px 0 12px;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 50;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
  }
  .filter-row {
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1;
    min-width: 260px;
    position: relative;
  }
  .search-input {
    width: 100%;
    height: 44px;
    background: var(--bg-card);
    border: 1px solid var(--line-2);
    border-radius: var(--r-md);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 0 16px 0 44px;
    transition: var(--tr);
  }
  .search-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.12);
  }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-3);
    pointer-events: none;
  }
  .cat-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .cat-btn {
    background: var(--bg-card);
    border: 1px solid var(--line-2);
    color: var(--ink-2);
    padding: 8px 14px;
    border-radius: 999px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--tr);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .cat-btn:hover {
    border-color: var(--line-3);
    color: var(--ink);
  }
  .cat-btn.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--bg);
  }
  .cat-btn .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ============ CARD GRID ============ */
  section.cards-section {
    padding: 32px 0 100px;
    background: var(--bg);
  }
  .layout {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 380px;
    gap: 32px;
    align-items: flex-start;
  }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
    min-width: 0;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 18px 18px 16px;
    cursor: pointer;
    transition: var(--tr);
    position: relative;
    text-align: left;
    color: inherit;
    font-family: inherit;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 2px;
    background: var(--cat);
    opacity: 0.7;
    transition: var(--tr);
  }
  .card:hover {
    border-color: var(--line-3);
    transform: translateY(-2px);
  }
  .card:hover::before { opacity: 1; height: 3px; }
  .card.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .card-cat {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--cat);
    margin-bottom: 10px;
  }
  .card-cat .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--cat);
  }
  .card-name {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: -0.005em;
    line-height: 1.2;
    font-variation-settings: "opsz" 24;
  }
  .card-effect {
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.45;
  }
  .card-targets {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 12px;
  }
  .target-tag {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-3);
    background: var(--bg-2);
    padding: 3px 7px;
    border-radius: 4px;
    border: 1px solid var(--line);
  }

  /* ============ DETAIL PANEL ============ */
  .detail-panel {
    position: sticky;
    top: 96px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 32px 28px;
    max-height: calc(100vh - 120px);
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--line-2) transparent;
  }
  .detail-panel::-webkit-scrollbar { width: 6px; }
  .detail-panel::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 3px; }
  .detail-panel-empty {
    text-align: center;
    color: var(--ink-3);
    padding: 60px 12px;
  }
  .detail-panel-empty svg {
    width: 36px;
    height: 36px;
    margin-bottom: 18px;
    opacity: 0.5;
  }
  .detail-panel-empty p {
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink-3);
  }
  .detail-cat {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--cat);
    margin-bottom: 14px;
  }
  .detail-cat .dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--cat);
  }
  .detail-name {
    font-family: var(--font-display);
    font-size: 30px;
    font-weight: 400;
    color: var(--ink);
    line-height: 1.05;
    letter-spacing: -0.015em;
    margin-bottom: 8px;
    font-variation-settings: "opsz" 72;
  }
  .detail-alias {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-3);
    margin-bottom: 24px;
  }
  .detail-effect {
    font-size: 15px;
    color: var(--ink);
    padding: 14px 16px;
    background: var(--bg-2);
    border-left: 3px solid var(--cat);
    border-radius: 0 var(--r-sm) var(--r-sm) 0;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .detail-block {
    margin-bottom: 22px;
  }
  .detail-block h4 {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 8px;
    font-weight: 500;
  }
  .detail-block p {
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-2);
  }
  .detail-block.caution {
    border: 1px solid rgba(232, 89, 60, 0.3);
    background: rgba(232, 89, 60, 0.06);
    padding: 14px 16px;
    border-radius: var(--r-sm);
  }
  .detail-block.caution h4 { color: var(--hot); }
  .detail-block.caution p { color: var(--ink); }
  .detail-targets {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .detail-targets .target-tag {
    font-size: 10px;
    color: var(--ink-2);
    background: var(--bg-2);
    padding: 5px 9px;
  }

  .studies {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .study {
    padding: 12px 14px;
    background: var(--bg-2);
    border-radius: var(--r-sm);
    border-left: 2px solid var(--accent);
  }
  .study-cite {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
    line-height: 1.45;
  }
  .study-note {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.55;
    margin-bottom: 8px;
  }
  .study-links {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .study-links a {
    color: var(--ink-3);
    text-decoration: none;
    border-bottom: 1px dashed var(--line-3);
    padding-bottom: 1px;
    transition: var(--tr);
  }
  .study-links a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ============ FOOTER ============ */
  footer {
    padding: 48px 0 40px;
    border-top: 1px solid var(--line);
    background: var(--bg-2);
    margin-top: 64px;
  }
  .footer-inner {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    align-items: flex-start;
  }
  .signature {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 17px;
    color: var(--ink);
    font-weight: 400;
    margin-bottom: 4px;
    font-variation-settings: "opsz" 24;
  }
  .signature-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--ink-3);
    text-transform: uppercase;
  }
  .disclaimer {
    font-size: 12px;
    color: var(--ink-3);
    max-width: 320px;
    line-height: 1.55;
    text-align: right;
  }

  /* ============ EMPTY STATE ============ */

// =========== STATE ===========
let state = {
  selectedId: null,
  category: 'all',
  search: ''
};

// =========== INIT ===========
function init() {
  buildCategoryFilters();
  renderCards();
  attachEvents();
}

// =========== CATEGORY FILTERS ===========
function buildCategoryFilters() {
  const container = document.getElementById('catFilters');
  const cats = Object.keys(CATEGORIES);
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = cat;
    btn.innerHTML = `<span class="dot" style="background: var(--cat-${cat});"></span>${CATEGORIES[cat].label}`;
    container.appendChild(btn);
  });

  container.addEventListener('click', e => {
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    state.category = btn.dataset.cat;
    container.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderCards();
  });
}

// =========== CARD RENDER ===========
function renderCards() {
  const grid = document.getElementById('cardsGrid');
  const q = state.search.toLowerCase().trim();
  const cat = state.category;

  const filtered = AGENTS.filter(a => {
    if (cat !== 'all' && a.category !== cat) return false;
    if (!q) return true;
    const hay = [a.name, a.alias, a.effect, a.mechanism, a.clinical, ...a.targets.map(t => TARGET_LABELS[t] || '')].join(' ').toLowerCase();
    return hay.includes(q);
  });

  document.getElementById('resultMeta').textContent = `${filtered.length} / ${AGENTS.length} ajan gösteriliyor`;

  grid.innerHTML = '';
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results"><div class="big">Eşleşen ajan yok</div><div>Arama veya filtreyi değiştir.</div></div>`;
    return;
  }

  filtered.forEach(a => {
    const card = document.createElement('button');
    card.className = 'card';
    if (state.selectedId === a.id) card.classList.add('active');
    card.style.setProperty('--cat', `var(--cat-${a.category})`);
    card.dataset.id = a.id;
    const targetTags = a.targets.length
      ? `<div class="card-targets">${a.targets.slice(0, 4).map(t => `<span class="target-tag">${TARGET_LABELS[t] || t}</span>`).join('')}${a.targets.length > 4 ? `<span class="target-tag">+${a.targets.length - 4}</span>` : ''}</div>`
      : `<div class="card-targets"><span class="target-tag">DA-nötr</span></div>`;
    card.innerHTML = `
      <div class="card-cat"><span class="dot"></span>${CATEGORIES[a.category].label}</div>
      <div class="card-name">${a.name}</div>
      <div class="card-effect">${a.effect}</div>
      ${targetTags}
    `;
    grid.appendChild(card);
  });
}

// =========== DETAIL PANEL ===========
function showDetail(id) {
  const agent = AGENTS.find(a => a.id === id);
  if (!agent) return;
  state.selectedId = id;

  document.querySelectorAll('.card').forEach(c => c.classList.toggle('active', c.dataset.id === id));

  const targetTagsHtml = agent.targets.length
    ? agent.targets.map(t => `<span class="target-tag">${TARGET_LABELS[t] || t}</span>`).join('')
    : '<span class="target-tag">Dopaminerjik nötr</span>';

  const regionsHtml = agent.regions.length
    ? agent.regions.map(r => `<span class="target-tag">${PATHWAY_LABELS[r] || r}</span>`).join('')
    : '<span class="target-tag" style="opacity:0.6;">—</span>';

  const studiesHtml = (agent.studies && agent.studies.length)
    ? `<div class="detail-block">
         <h4>Anahtar çalışmalar</h4>
         <div class="studies">
           ${agent.studies.map(sid => {
             const s = STUDIES[sid];
             if (!s) return '';
             const links = [];
             if (s.doi) links.push(`<a href="https://doi.org/${s.doi}" target="_blank" rel="noopener">DOI</a>`);
             links.push(`<a href="https://pubmed.ncbi.nlm.nih.gov/${s.pmid}/" target="_blank" rel="noopener">PMID ${s.pmid}</a>`);
             return `<div class="study">
               <div class="study-cite">${s.cite}</div>
               <div class="study-note">${s.note}</div>
               <div class="study-links">${links.join('')}</div>
             </div>`;
           }).join('')}
         </div>
       </div>`
    : '';

  const html = `
    <div class="detail-cat" style="--cat: var(--cat-${agent.category}); color: var(--cat-${agent.category});">
      <span class="dot"></span>${CATEGORIES[agent.category].label}
    </div>
    <div class="detail-name">${agent.name}</div>
    <div class="detail-alias">${agent.alias || ''}</div>
    <div class="detail-effect" style="border-left-color: var(--cat-${agent.category});">${agent.effect}</div>
    <div class="detail-block">
      <h4>Mekanizma</h4>
      <p>${agent.mechanism}</p>
    </div>
    <div class="detail-block">
      <h4>Klinik kullanım</h4>
      <p>${agent.clinical}</p>
    </div>
    ${agent.caution ? `<div class="detail-block caution"><h4>Uyarı &amp; etkileşim</h4><p>${agent.caution}</p></div>` : ''}
    ${studiesHtml}
    <div class="detail-block">
      <h4>Moleküler hedef</h4>
      <div class="detail-targets">${targetTagsHtml}</div>
    </div>
    <div class="detail-block">
      <h4>Etkilenen yolaklar</h4>
      <div class="detail-targets">${regionsHtml}</div>
    </div>
  `;
  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailEmpty').style.display = 'none';
  document.getElementById('detailContent').style.display = 'block';
  document.getElementById('detailPanel').classList.add('open');

  highlightSvg(agent.targets);
  highlightPathways(agent.regions);
}

// =========== SVG HIGHLIGHT ===========
function highlightSvg(targets) {
  const has = targets && targets.length > 0;
  ALL_TARGETS.forEach(t => {
    const el = document.getElementById(t);
    if (!el) return;
    el.classList.remove('hl', 'dim');
    if (!has) return;
    if (targets.includes(t)) el.classList.add('hl');
    else el.classList.add('dim');
  });
}

function highlightPathways(regions) {
  document.querySelectorAll('.pp').forEach(p => {
    p.classList.toggle('hl', regions && regions.includes(p.dataset.id));
  });
}

// =========== EVENTS ===========
function attachEvents() {
  document.getElementById('cardsGrid').addEventListener('click', e => {
    const card = e.target.closest('.card');
    if (!card) return;
    showDetail(card.dataset.id);
    if (window.innerWidth < 1101) {
      document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  });

  const searchInput = document.getElementById('searchInput');
  let searchTimer;
  searchInput.addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.search = e.target.value;
      renderCards();
    }, 120);
  });

  document.getElementById('closeBtn').addEventListener('click', () => {
    document.getElementById('detailPanel').classList.remove('open');
  });

  document.getElementById('themeToggle').addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('dopamin-theme', next); } catch (e) {}
  });

  try {
    const saved = localStorage.getItem('dopamin-theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  } catch (e) {}
}

init();
</script>
